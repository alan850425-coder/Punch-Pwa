<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="出勤打卡">
  <meta name="theme-color" content="#1F3864">
  <title>出勤打卡</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --blue: #1F3864; --blue-light: #2E75B6; --blue-bg: #EBF3FB;
      --green: #1a7a3c; --green-bg: #e8f5ee;
      --red: #c0392b; --red-bg: #fdf0ef;
      --gray: #6b7280; --gray-bg: #f3f4f6;
      --border: #e5e7eb; --text: #111827; --text2: #6b7280; --white: #ffffff;
      --radius: 12px; --radius-sm: 8px;
    }
    html, body { height: 100%; background: #f0f4f8; font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif; color: var(--text); }
    .screen { display: none; min-height: 100vh; flex-direction: column; }
    .screen.active { display: flex; }

    #setupScreen { align-items: center; justify-content: center; padding: 2rem; background: var(--white); }
    .setup-logo { width: 72px; height: 72px; background: var(--blue); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
    .setup-logo svg { width: 36px; height: 36px; fill: white; }
    .setup-title { font-size: 22px; font-weight: 700; color: var(--blue); text-align: center; margin-bottom: 6px; }
    .setup-sub { font-size: 14px; color: var(--text2); text-align: center; margin-bottom: 2rem; }
    .setup-label { font-size: 13px; color: var(--text2); margin-bottom: 6px; }
    .setup-input { width: 100%; height: 52px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 18px; padding: 0 16px; color: var(--text); background: var(--white); outline: none; }
    .setup-input:focus { border-color: var(--blue-light); }
    .setup-btn { width: 100%; height: 52px; background: var(--blue); color: white; border: none; border-radius: var(--radius-sm); font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 1rem; }
    .setup-btn:active { opacity: 0.8; }

    #mainScreen { background: #f0f4f8; }
    .topbar { background: var(--blue); color: white; padding: 16px 20px 14px; display: flex; align-items: center; justify-content: space-between; }
    .topbar-name { font-size: 16px; font-weight: 600; }
    .topbar-sub { font-size: 12px; opacity: 0.7; margin-top: 1px; }
    .topbar-settings { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.15); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .main-content { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    .clock-card { background: var(--white); border-radius: var(--radius); padding: 20px; text-align: center; border: 1px solid var(--border); }
    .clock-time { font-size: 44px; font-weight: 300; color: var(--blue); letter-spacing: 3px; font-variant-numeric: tabular-nums; }
    .clock-date { font-size: 14px; color: var(--text2); margin-top: 4px; }

    .punch-card { background: var(--white); border-radius: var(--radius); padding: 16px; border: 1px solid var(--border); }
    .card-title { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
    .punch-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .punch-btn { height: 64px; border-radius: var(--radius-sm); border: none; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; transition: transform 0.1s; }
    .punch-btn:active { transform: scale(0.96); }
    .punch-btn-in { background: var(--green-bg); color: var(--green); }
    .punch-btn-out { background: var(--red-bg); color: var(--red); }
    .punch-btn svg { width: 22px; height: 22px; }
    .punch-btn span { font-size: 13px; }

    .makeup-card { background: var(--white); border-radius: var(--radius); padding: 16px; border: 1px solid var(--border); }
    .makeup-row { display: flex; gap: 8px; }
    .makeup-date { flex: 1; height: 44px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; padding: 0 12px; color: var(--text); background: var(--white); outline: none; }
    .makeup-date:focus { border-color: var(--blue-light); }
    .makeup-time { width: 105px; height: 44px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; padding: 0 12px; color: var(--text); background: var(--white); outline: none; }
    .makeup-time:focus { border-color: var(--blue-light); }
    .makeup-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .makeup-btn { height: 40px; border-radius: var(--radius-sm); border: 1.5px solid; font-size: 13px; font-weight: 600; cursor: pointer; }
    .makeup-btn:active { opacity: 0.7; }
    .makeup-btn-in { background: var(--green-bg); color: var(--green); border-color: var(--green); }
    .makeup-btn-out { background: var(--red-bg); color: var(--red); border-color: var(--red); }

    .log-card { background: var(--white); border-radius: var(--radius); padding: 16px; border: 1px solid var(--border); }
    .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 8px; }
    .log-title-text { font-size: 12px; color: var(--text2); flex-shrink: 0; }
    .export-row { display: flex; align-items: center; gap: 6px; }
    .export-month { height: 32px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; padding: 0 8px; color: var(--text); background: var(--white); outline: none; }
    .export-btn { height: 32px; padding: 0 10px; background: var(--blue-bg); color: var(--blue); border: none; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
    .export-btn:active { opacity: 0.7; }

    .log-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 8px; }
    .log-item:last-child { border-bottom: none; }
    .log-item-left { display: flex; align-items: center; gap: 10px; flex: 1; cursor: pointer; }
    .log-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .log-dot-in { background: var(--green); }
    .log-dot-out { background: var(--red); }
    .log-date { font-size: 13px; color: var(--text); font-weight: 500; }
    .log-badge { font-size: 11px; color: var(--text2); }
    .log-makeup-tag { font-size: 10px; color: var(--text2); background: var(--gray-bg); border-radius: 4px; padding: 1px 5px; margin-left: 4px; }
    .log-time { font-size: 15px; font-weight: 600; color: var(--text); }
    .log-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .log-btn { width: 32px; height: 32px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--gray-bg); cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .log-btn:active { opacity: 0.6; }
    .log-btn-edit { color: var(--blue); }
    .log-btn-del { color: var(--red); }
    .log-empty { text-align: center; padding: 1.5rem 0; color: var(--text2); font-size: 14px; }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: white; padding: 10px 20px; border-radius: 99px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 999; }
    .toast.show { opacity: 1; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-end; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--white); border-radius: 20px 20px 0 0; padding: 24px 20px; width: 100%; }
    .modal-title { font-size: 16px; font-weight: 700; color: var(--blue); margin-bottom: 16px; }
    .modal-label { font-size: 13px; color: var(--text2); margin-bottom: 6px; margin-top: 12px; }
    .modal-input { width: 100%; height: 48px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 16px; padding: 0 14px; color: var(--text); outline: none; background: var(--white); }
    .modal-input:focus { border-color: var(--blue-light); }
    .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
    .modal-cancel { height: 48px; background: var(--gray-bg); color: var(--text); border: none; border-radius: var(--radius-sm); font-size: 15px; cursor: pointer; }
    .modal-save { height: 48px; background: var(--blue); color: white; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; }
    .modal-save-green { height: 48px; background: var(--green); color: white; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; }
    .modal-danger { height: 44px; width: 100%; background: none; color: var(--red); border: 1.5px solid var(--red); border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; margin-top: 10px; }
  </style>
</head>
<body>

<div class="screen active" id="setupScreen">
  <div class="setup-logo">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/><path d="M0 0h24v24H0z" fill="none"/></svg>
  </div>
  <div class="setup-title">出勤打卡</div>
  <div class="setup-sub">請輸入您的姓名以開始使用</div>
  <div class="setup-label">您的姓名</div>
  <input class="setup-input" id="setupName" type="text" placeholder="例：王小明" maxlength="20">
  <button class="setup-btn" onclick="doSetup()">開始使用</button>
</div>

<div class="screen" id="mainScreen">
  <div class="topbar">
    <div>
      <div class="topbar-name" id="topName"></div>
      <div class="topbar-sub">澤天健康事業</div>
    </div>
    <button class="topbar-settings" onclick="openSettings()" aria-label="設定">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <div class="main-content">
    <div class="clock-card">
      <div class="clock-time" id="clockTime">--:--:--</div>
      <div class="clock-date" id="clockDate"></div>
    </div>

    <div class="punch-card">
      <div class="card-title">立即打卡</div>
      <div class="punch-btns">
        <button class="punch-btn punch-btn-in" onclick="punchNow('上班')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          <span>上班打卡</span>
        </button>
        <button class="punch-btn punch-btn-out" onclick="punchNow('下班')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span>下班打卡</span>
        </button>
      </div>
    </div>

    <div class="makeup-card">
      <div class="card-title">補打卡（選擇日期時間）</div>
      <div class="makeup-row">
        <input class="makeup-date" type="date" id="makeupDate">
        <input class="makeup-time" type="time" id="makeupTime">
      </div>
      <div class="makeup-btns">
        <button class="makeup-btn makeup-btn-in" onclick="punchMakeup('上班')">補打上班</button>
        <button class="makeup-btn makeup-btn-out" onclick="punchMakeup('下班')">補打下班</button>
      </div>
    </div>

    <div class="log-card">
      <div class="log-header">
        <div class="log-title-text">打卡紀錄</div>
        <div class="export-row">
          <input class="export-month" type="month" id="exportMonth">
          <button class="export-btn" onclick="exportExcel()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            匯出
          </button>
        </div>
      </div>
      <div id="logList"></div>
    </div>
  </div>
</div>

<!-- 設定 Modal -->
<div class="modal-overlay" id="settingsModal" onclick="closeModalOverlay(event,'settingsModal')">
  <div class="modal">
    <div class="modal-title">設定</div>
    <div class="modal-label">修改姓名</div>
    <input class="modal-input" id="settingsName" type="text" maxlength="20">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('settingsModal')">取消</button>
      <button class="modal-save" onclick="saveSettings()">儲存</button>
    </div>
    <button class="modal-danger" onclick="clearAllData()">清除所有打卡紀錄</button>
  </div>
</div>

<!-- 編輯紀錄 Modal -->
<div class="modal-overlay" id="editModal" onclick="closeModalOverlay(event,'editModal')">
  <div class="modal">
    <div class="modal-title">編輯紀錄</div>
    <div class="modal-label">日期</div>
    <input class="modal-input" type="date" id="editDate">
    <div class="modal-label">時間</div>
    <input class="modal-input" type="time" id="editTime">
    <div class="modal-label">類型</div>
    <select class="modal-input" id="editType">
      <option value="上班">上班</option>
      <option value="下班">下班</option>
    </select>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('editModal')">取消</button>
      <button class="modal-save-green" onclick="saveEdit()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const KEY_NAME = 'punch_name';
const KEY_RECORDS = 'punch_records';
let userName = '';
let records = [];
let editingIndex = -1;

function pad(n){ return String(n).padStart(2,'0'); }

function init(){
  userName = localStorage.getItem(KEY_NAME) || '';
  try { records = JSON.parse(localStorage.getItem(KEY_RECORDS) || '[]'); } catch(e){ records = []; }
  if(userName){ showMain(); } else { showSetup(); }
  setInterval(updateClock, 1000);
  updateClock();
  const today = new Date();
  document.getElementById('makeupDate').value = today.getFullYear()+'-'+pad(today.getMonth()+1)+'-'+pad(today.getDate());
  document.getElementById('makeupTime').value = pad(today.getHours())+':'+pad(today.getMinutes());
  document.getElementById('exportMonth').value = today.getFullYear()+'-'+pad(today.getMonth()+1);
}

function showSetup(){
  document.getElementById('setupScreen').classList.add('active');
  document.getElementById('mainScreen').classList.remove('active');
}
function showMain(){
  document.getElementById('setupScreen').classList.remove('active');
  document.getElementById('mainScreen').classList.add('active');
  document.getElementById('topName').textContent = userName;
  renderLog();
}
function doSetup(){
  const name = document.getElementById('setupName').value.trim();
  if(!name){ showToast('請輸入姓名'); return; }
  userName = name; localStorage.setItem(KEY_NAME, userName); showMain();
}

function updateClock(){
  const n = new Date();
  document.getElementById('clockTime').textContent = pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('clockDate').textContent = n.getFullYear()+'年'+pad(n.getMonth()+1)+'月'+pad(n.getDate())+'日　星期'+days[n.getDay()];
}

function saveRecords(){ localStorage.setItem(KEY_RECORDS, JSON.stringify(records)); }

function punchNow(type){
  const now = new Date();
  records.push({ name: userName, type,
    date: now.getFullYear()+'/'+pad(now.getMonth()+1)+'/'+pad(now.getDate()),
    time: pad(now.getHours())+':'+pad(now.getMinutes()),
    ts: now.toISOString(), makeup: false });
  saveRecords(); renderLog();
  showToast(type+' 打卡成功　'+pad(now.getHours())+':'+pad(now.getMinutes()));
}

function punchMakeup(type){
  const dateVal = document.getElementById('makeupDate').value;
  const timeVal = document.getElementById('makeupTime').value;
  if(!dateVal || !timeVal){ showToast('請選擇日期與時間'); return; }
  records.push({ name: userName, type,
    date: dateVal.replace(/-/g,'/'), time: timeVal,
    ts: new Date(dateVal+'T'+timeVal).toISOString(), makeup: true });
  saveRecords(); renderLog();
  showToast('補打'+type+' '+dateVal.replace(/-/g,'/')+' '+timeVal);
}

function renderLog(){
  const sorted = records.slice().sort((a,b) => b.ts.localeCompare(a.ts));
  const el = document.getElementById('logList');
  if(!sorted.length){ el.innerHTML = '<div class="log-empty">尚無打卡紀錄</div>'; return; }
  el.innerHTML = sorted.slice(0,60).map(r => {
    const realIdx = records.indexOf(r);
    return `<div class="log-item">
      <div class="log-item-left" onclick="openEdit(${realIdx})">
        <div class="log-dot ${r.type==='上班'?'log-dot-in':'log-dot-out'}"></div>
        <div>
          <div class="log-date">${r.date}${r.makeup?'<span class="log-makeup-tag">補打</span>':''}</div>
          <div class="log-badge">${r.type}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="log-time">${r.time}</div>
        <div class="log-actions">
          <button class="log-btn log-btn-edit" onclick="openEdit(${realIdx})" aria-label="編輯">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="log-btn log-btn-del" onclick="deleteRecord(${realIdx})" aria-label="刪除">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openEdit(idx){
  editingIndex = idx;
  const r = records[idx];
  document.getElementById('editDate').value = r.date.replace(/\//g,'-');
  document.getElementById('editTime').value = r.time;
  document.getElementById('editType').value = r.type;
  document.getElementById('editModal').classList.add('open');
}
function saveEdit(){
  const dateVal = document.getElementById('editDate').value;
  const timeVal = document.getElementById('editTime').value;
  const typeVal = document.getElementById('editType').value;
  if(!dateVal || !timeVal){ showToast('請填寫完整'); return; }
  records[editingIndex] = { ...records[editingIndex],
    date: dateVal.replace(/-/g,'/'), time: timeVal, type: typeVal,
    ts: new Date(dateVal+'T'+timeVal).toISOString(), makeup: true };
  saveRecords(); renderLog(); closeModal('editModal'); showToast('已更新');
}
function deleteRecord(idx){
  if(!confirm('確定刪除這筆紀錄？')) return;
  records.splice(idx,1); saveRecords(); renderLog(); showToast('已刪除');
}

function exportExcel(){
  const monthVal = document.getElementById('exportMonth').value;
  if(!monthVal){ showToast('請選擇月份'); return; }
  const [year, month] = monthVal.split('-').map(Number);
  const daysInMonth = new Date(year, month, 0).getDate();
  const days = ['日','一','二','三','四','五','六'];

  // Build lookup: date -> {上班: time, 下班: time}
  const lookup = {};
  records.forEach(r => {
    if(!lookup[r.date]) lookup[r.date] = {};
    // 有多筆同類型取最後一筆
    lookup[r.date][r.type] = r.time;
  });

  const header = ['日期','星期','上班時間','下班時間'];
  const rows = [header];
  for(let d = 1; d <= daysInMonth; d++){
    const dateStr = year+'/'+pad(month)+'/'+pad(d);
    const dateObj = new Date(year, month-1, d);
    const weekday = '星期'+days[dateObj.getDay()];
    const inTime = (lookup[dateStr] && lookup[dateStr]['上班']) || '';
    const outTime = (lookup[dateStr] && lookup[dateStr]['下班']) || '';
    rows.push([dateStr, weekday, inTime, outTime]);
  }

  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:12},{wch:8},{wch:10},{wch:10}];

  // 週末標灰（僅設定欄寬，樣式需 xlsx-style，這裡用備註標記）
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, year+'年'+month+'月');
  XLSX.writeFile(wb, '打卡紀錄_'+userName+'_'+year+pad(month)+'.xlsx');
  showToast('匯出成功');
}

function openSettings(){
  document.getElementById('settingsName').value = userName;
  document.getElementById('settingsModal').classList.add('open');
}
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function closeModalOverlay(e,id){ if(e.target===document.getElementById(id)) closeModal(id); }
function saveSettings(){
  const name = document.getElementById('settingsName').value.trim();
  if(!name){ showToast('請輸入姓名'); return; }
  userName = name; localStorage.setItem(KEY_NAME,userName);
  document.getElementById('topName').textContent = userName;
  closeModal('settingsModal'); showToast('已儲存');
}
function clearAllData(){
  if(!confirm('確定要清除所有打卡紀錄？')) return;
  records = []; saveRecords(); renderLog();
  closeModal('settingsModal'); showToast('已清除所有紀錄');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('show'),2500);
}

init();
</script>
<script>if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }</script>
